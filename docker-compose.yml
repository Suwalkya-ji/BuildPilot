services:
  redis:
    image: redis:7-alpine
    container_name: buildpilot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: buildpilot-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: buildpilot-server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: buildpilot-worker
    command: ["npm", "run", "worker"]
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - redis
      - qdrant
    restart: unless-stopped

volumes:
  qdrant_data: